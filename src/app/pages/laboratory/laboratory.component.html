<div class="p-6 space-y-6">

  <!-- Page Header -->
  <div class="flex justify-between items-center">

    <div>
      <h1 class="text-2xl font-bold text-gray-800">
        Laboratory Management
      </h1>
      <p class="text-gray-500 text-sm">
        Manage lab tests, results and patient samples
      </p>
    </div>

    <button class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition">
      + New Lab Test
    </button>

  </div>


  <!-- Statistics -->
  <div class="grid grid-cols-4 gap-6">

    <div class="bg-white p-5 rounded-xl shadow">
      <p class="text-gray-500 text-sm">Total Tests</p>
      <h2 class="text-2xl font-bold mt-2">152</h2>
    </div>

    <div class="bg-yellow-50 p-5 rounded-xl shadow">
      <p class="text-yellow-600 text-sm">Pending</p>
      <h2 class="text-2xl font-bold mt-2">24</h2>
    </div>

    <div class="bg-green-50 p-5 rounded-xl shadow">
      <p class="text-green-600 text-sm">Completed</p>
      <h2 class="text-2xl font-bold mt-2">108</h2>
    </div>

    <div class="bg-red-50 p-5 rounded-xl shadow">
      <p class="text-red-600 text-sm">Critical Results</p>
      <h2 class="text-2xl font-bold mt-2">5</h2>
    </div>

  </div>


  <!-- Filters -->
  <div class="bg-white p-4 rounded-xl shadow flex gap-4">

    <input
      type="text"
      placeholder="Search patient..."
      class="border border-gray-300 rounded-lg px-3 py-2 w-64"
    />

    <select class="border border-gray-300 rounded-lg px-3 py-2">
      <option>All Tests</option>
      <option>Blood Test</option>
      <option>Urine Test</option>
      <option>Covid Test</option>
    </select>

    <select class="border border-gray-300 rounded-lg px-3 py-2">
      <option>Status</option>
      <option>Pending</option>
      <option>Processing</option>
      <option>Completed</option>
    </select>

  </div>


  <!-- Lab Tests Table -->
  <div class="bg-white rounded-xl shadow overflow-hidden">

    <table class="w-full text-left">

      <thead class="bg-gray-100 text-gray-600 text-sm">
        <tr>
          <th class="p-4">Patient</th>
          <th class="p-4">Test</th>
          <th class="p-4">Doctor</th>
          <th class="p-4">Date</th>
          <th class="p-4">Status</th>
          <th class="p-4">Actions</th>
        </tr>
      </thead>

      <tbody>

        <tr class="border-t hover:bg-gray-50">
          <td class="p-4">John Smith</td>
          <td class="p-4">Blood Test</td>
          <td class="p-4">Dr. Adams</td>
          <td class="p-4">10 Mar 2026</td>

          <td class="p-4">
            <span class="bg-yellow-100 text-yellow-700 px-2 py-1 rounded text-xs">
              Pending
            </span>
          </td>
          <td class="p-4 flex gap-2">
            <button class="text-blue-600 hover:underline">
              View
            </button>
            <button class="text-green-600 hover:underline">
              Result
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
