<section class="animate-pageFlip">
    <h2 class="text-2xl text-white font-semibold">Medication Tracker</h2>

    <div class="bg-gray-950 text-white p-10 space-y-4 rounded-md shadow-2xl">
        <!-- header text and button -->
        <div class="flex justify-between">
            <h2 class="text-xl text-white font-semibold">My Medications</h2>
            <div class="flex flex-wrap space-x-2">
                <button class="bg-blue-950 text-white px-3 py-1 rounded-full hover:bg-blue-900 transition">Active</button>
                <button class="border border-blue-950 text-white px-3 py-1 rounded-full hover:bg-blue-950 transition">Inactive</button>
                <button class="border border-blue-950 text-white px-3 py-1 rounded-full hover:bg-blue-950 transition">Pending</button>
                <button class="border border-blue-950 text-white px-3 py-1 rounded-full hover:bg-blue-950 transition">Completed</button>
            </div>
            <!-- add medication button -->
            <button 
                (click)="toggleForm()" 
                class="bg-blue-950 text-white py-2 px-5 rounded-md hover:bg-blue-900 transition"
                [ngClass]="isFormVisible ? 'bi bi-x bg-red-800 hover:bg-red-700' : 'bi bi-plus bg-blue-950 hover:bg-blue-900'">
                <span>{{ isFormVisible ? 'Close Form' : 'Add medication' }}</span>
            </button>
        </div>

        <!-- medication table -->
        <table class="w-full border-2 border-gray-700 text-white bg-gray-900 shadow-lg">
            <thead>
                <tr class="text-left text-xl font-semibold">
                    <th class="border-2 border-gray-700 p-2">Medication</th>
                    <th class="border-2 border-gray-700 p-2">Dosage</th>
                    <th class="border-2 border-gray-700 p-2">Schedule</th>
                    <th class="border-2 border-gray-700 p-2">Status</th>
                    <th class="border-2 border-gray-700 p-2">Actions</th>
                </tr>
            </thead>

            <tbody *ngFor="let med of medicationsTracker">
                <tr class="border-2 border-gray-700">
                    <td class="py-3 border-2 border-gray-700 px-2">{{ med.name }}</td>
                    <td class="py-3 border-2 border-gray-700 px-2">{{ med.dosage }}</td>
                    <td class="py-3 border-2 border-gray-700 px-2">{{ med.schedule }}</td>
                    <td class="py-3 border-2 border-gray-700 px-2">
                        <button 
                        class="py-1 px-3 rounded-full"
                        [ngClass]="{
                            'bg-blue-800 text-white hover:bg-blue-700 transition': med.status === 'Active', 
                            'bg-red-800 text-white hover:bg-red-700 transition': med.status === 'Inactive',
                            'bg-red-600 text-white hover:bg-red-500 transition': med.status === 'Pending',
                            'bg-green-800 text-white hover:bg-green-700 transition': med.status === 'Completed'
                        }"
                        >{{ med.status }}</button>
                    </td>
                    <td class="flex space-x-2 py-3 px-1">
                        <!-- ation buttons -->
                        <button class="bg-yellow-800 text-white py-1 px-3 rounded-full hover:bg-yellow-700 transition">
                            Edit
                        </button>
                        <button class="bg-red-900 text-white py-1 px-3 rounded-full hover:bg-red-700 transition">
                            Delete
                        </button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</section>

<app-medication-form 
    *ngIf="isFormVisible"
    (cancel)="closeFormFromChild()"
    class="text-white"
    >
</app-medication-form>
